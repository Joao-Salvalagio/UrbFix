name: urbfix_mobile
description: "Aplicativo móvel UrbFix para reporte de problemas urbanos pelos cidadãos."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  geolocator: ^12.0.0
  image_picker: ^1.1.2
  provider: ^6.1.4
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
